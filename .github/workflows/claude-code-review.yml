name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request for a Prolog interpreter/engine written in Rust.

            Focus on:
            - Correctness: unification edge cases, backtracking behavior, cut semantics, occurs check
            - Prolog semantics: Edinburgh/ISO compliance, operator precedence, negation-as-failure, if-then-else
            - Arithmetic: integer overflow handling (checked ops), float NaN/Infinity detection, division by zero
            - Safety: recursion depth limits, no panics on malformed input, trail-based backtracking correctness
            - Term handling: proper list construction (nil termination), variable renaming freshness, substitution walking
            - Performance: unnecessary clones in solve loop, quadratic goal list operations, index utilization
            - Test coverage for parser, solver, and built-in predicate paths

            Do NOT flag:
            - Style nits or formatting (clippy pedantic handles this)
            - Missing documentation or comments
            - Naming preferences

            Use the repository's CLAUDE.md for project conventions. Only report issues you are confident about. Be specific — cite file paths and line numbers.

            Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.

          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
